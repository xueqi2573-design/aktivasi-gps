<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aktivasi GPS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1877f2">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, Segoe UI, Roboto, sans-serif; background: #f0f2f5; padding: 20px; }
  .container { max-width: 500px; margin: 0 auto; }
  .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.1); margin-bottom: 15px; }
  h1 { color: #1877f2; margin-bottom: 15px; font-size: 24px; }
  button { background: #1877f2; color: white; border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; width: 100%; margin-top: 10px; }
  button:hover { background: #1565c0; }
  button:disabled { background: #ccc; cursor: not-allowed; }
  input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-top: 8px; }
  label { font-weight: 600; color: #333; font-size: 14px; display: block; margin-top: 12px; }
  .status { padding: 12px; border-radius: 8px; margin-top: 15px; font-size: 14px; }
  .ok { background: #d4edda; color: #155724; }
  .err { background: #f8d7da; color: #721c24; }
  .info { background: #e7f3ff; color: #004085; }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="container">
  <div id="setupScreen" class="card">
    <h1>🔧 Setup Supabase</h1>
    <p style="color:#666;margin-bottom:15px;">Masukkan data dari Supabase Anda:</p>
    <label>Project URL:</label>
    <input id="sbUrl" type="url" placeholder="https://xxxxx.supabase.co">
    <label>Publishable Key (anon):</label>
    <input id="sbKey" type="text" placeholder="sb_p...">
    <button onclick="saveSetup()">💾 Simpan & Lanjut</button>
    <div id="setupStatus" class="status info">Siap...</div>
  </div>

  <div id="modeScreen" class="card hidden">
    <h1>👨‍👩‍ Aktivasi GPS</h1>
    <p style="margin:15px 0;color:#555;">Pilih peran Anda:</p>
    <button onclick="setMode('child')">📱 Saya ANAK (HP yang dilacak)</button>
    <button onclick="setMode('parent')" style="background:#42b72a;">👨‍👩‍ Saya ORANG TUA (melihat lokasi)</button>
    <button onclick="resetSetup()" style="background:#6c757d;">⚙️ Reset Setup</button>
  </div>

  <div id="childScreen" class="card hidden">
    <h1>📱 Mode Anak</h1>
    <label>Kode Keluarga:</label>
    <input id="childCode" type="text" placeholder="contoh: keluargaku2026">
    <label>Interval (detik):</label>
    <input id="interval" type="number" value="30" min="10">
    <button onclick="startChild()">🚀 Mulai Kirim Lokasi</button>
    <button onclick="stopChild()" style="background:#dc3545;" id="stopBtn" disabled>⏹ Berhenti</button>
    <div id="childStatus" class="status info">Siap...</div>
  </div>

  <div id="parentScreen" class="card hidden">
    <h1>👨‍👩‍ Mode Orang Tua</h1>
    <label>Kode Keluarga:</label>
    <input id="parentCode" type="text" placeholder="contoh: keluargaku2026">
    <button onclick="startParent()">📡 Mulai Melacak</button>
    <div id="parentStatus" class="status info">Menunggu...</div>
    <div id="mapContainer" class="hidden" style="margin-top:20px;">
      <div id="map" style="height:300px;border-radius:8px;"></div>
      <div id="infoLoc" style="margin-top:10px;font-size:14px;"></div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
let sbClient = null;
let watchId = null;
let sendTimer = null;
let map = null;
let marker = null;

function saveSetup() {
  console.log('🔵 saveSetup dipanggil');
  
  const url = document.getElementById('sbUrl').value.trim();
  const key = document.getElementById('sbKey').value.trim();
  
  if (!url || !key) {
    alert('⚠️ URL dan Key harus diisi!');
    return;
  }
  
  if (!url.includes('supabase.co')) {
    alert('⚠️ URL tidak valid!');
    return;
  }
  
  try {
    localStorage.setItem('sb_url', url);
    localStorage.setItem('sb_key', key);
    
    // PENTING: Inisialisasi sbClient SEKARANG!
    sbClient = window.supabase.createClient(url, key);
    console.log('✅ sbClient dibuat dan siap!');
    
    document.getElementById('setupStatus').className = 'status ok';
    document.getElementById('setupStatus').textContent = '✅ Tersimpan! Memuat...';
    
    setTimeout(() => {
      showScreen('modeScreen');
    }, 1000);
  } catch (e) {
    console.error('❌ Error:', e);
    document.getElementById('setupStatus').className = 'status err';
    document.getElementById('setupStatus').textContent = '❌ Error: ' + e.message;
  }
}

function resetSetup() {
  localStorage.removeItem('sb_url');
  localStorage.removeItem('sb_key');
  sbClient = null;
  showScreen('setupScreen');
}

function showScreen(id) {
  ['setupScreen', 'modeScreen', 'childScreen', 'parentScreen'].forEach(s => {
    document.getElementById(s).classList.add('hidden');
  });
  document.getElementById(id).classList.remove('hidden');
}

function initApp() {
  console.log('🔵 initApp dipanggil');
  
  const url = localStorage.getItem('sb_url');
  const key = localStorage.getItem('sb_key');
  
  if (!url || !key) {
    console.log('⚠️ Belum setup, tampilkan setup screen');
    showScreen('setupScreen');
    return;
  }
  
  try {
    sbClient = window.supabase.createClient(url, key);
    console.log('✅ Supabase client dibuat');
    showScreen('modeScreen');
  } catch (e) {
    console.error('❌ Gagal buat client:', e);
    alert('Gagal connect: ' + e.message);
    showScreen('setupScreen');
  }
}

function setMode(mode) {
  console.log('🔵 setMode:', mode);
  
  if (mode === 'child') {
    showScreen('childScreen');
  } else {
    showScreen('parentScreen');
    initMap();
  }
}

function initMap() {
  if (map) return;
  map = L.map('map').setView([-2.5, 118], 4);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);
}

function startChild() {
  const code = document.getElementById('childCode').value.trim();
  if (!code) {
    alert('Masukkan kode keluarga!');
    return;
  }
  
  // CEK: Apakah sbClient sudah siap?
  if (!sbClient) {
    alert('❌ Koneksi ke Supabase belum siap!\n\nSilakan refresh halaman dan setup ulang.');
    return;
  }
  
  const interval = parseInt(document.getElementById('interval').value) * 1000;
  const status = document.getElementById('childStatus');
  
  status.className = 'status info';
  status.textContent = 'Memulai GPS...';
  
  if (!navigator.geolocation) {
    status.className = 'status err';
    status.textContent = '❌ Browser tidak support GPS';
    return;
  }
  
  watchId = navigator.geolocation.watchPosition(
    (pos) => {
      console.log('📍 Lokasi:', pos.coords.latitude, pos.coords.longitude);
      sendLocation(code, pos.coords);
    },
    (err) => {
      console.error('❌ GPS error:', err);
      status.className = 'status err';
      status.textContent = '❌ GPS: ' + err.message;
    },
    { enableHighAccuracy: true }
  );
  
  sendTimer = setInterval(() => {
    console.log('⏱️ Interval trigger');
  }, interval);
  
  status.className = 'status ok';
  status.textContent = '✅ GPS aktif! Kirim tiap ' + (interval/1000) + ' detik';
  document.getElementById('stopBtn').disabled = false;
}

async function sendLocation(code, coords) {
  try {
    console.log('📤 Mengirim lokasi ke Supabase...');
    console.log('sbClient:', sbClient);
    
    const { data, error } = await sbClient
      .from('locations')
      .insert({
        family_code: code,
        lat: coords.latitude,
        lng: coords.longitude,
        accuracy: coords.accuracy
      });
    
    if (error) throw error;
    
    console.log('✅ Lokasi terkirim:', data);
    document.getElementById('childStatus').textContent = 
      '✅ Terkirim @ ' + new Date().toLocaleTimeString('id-ID');
  } catch (e) {
    console.error('❌ Gagal kirim:', e);
    document.getElementById('childStatus').className = 'status err';
    document.getElementById('childStatus').textContent = '❌ Gagal: ' + e.message;
  }
}

function stopChild() {
  if (watchId) navigator.geolocation.clearWatch(watchId);
  if (sendTimer) clearInterval(sendTimer);
  watchId = sendTimer = null;
  document.getElementById('childStatus').className = 'status info';
  document.getElementById('childStatus').textContent = 'Dihentikan.';
  document.getElementById('stopBtn').disabled = true;
}

async function startParent() {
  const code = document.getElementById('parentCode').value.trim();
  if (!code) {
    alert('Masukkan kode keluarga!');
    return;
  }
  
  const status = document.getElementById('parentStatus');
  status.className = 'status info';
  status.textContent = 'Menghubungkan...';
  
  try {
    const { data, error } = await sbClient
      .from('locations')
      .select('*')
      .eq('family_code', code)
      .order('created_at', { ascending: false })
      .limit(1)
      .single();
    
    if (error) throw error;
    
    if (data) {
      console.log('📍 Lokasi terakhir:', data);
      updateMap(data);
      document.getElementById('mapContainer').classList.remove('hidden');
    }
    
    sbClient.channel('locations-' + code)
      .on('postgres_changes',
        { event: 'INSERT', schema: 'public', table: 'locations', filter: 'family_code=eq.' + code },
        (payload) => {
          console.log('📡 Realtime update:', payload.new);
          updateMap(payload.new);
          document.getElementById('mapContainer').classList.remove('hidden');
        }
      ).subscribe();
    
    status.className = 'status ok';
    status.textContent = '📡 Live - Mendengarkan...';
  } catch (e) {
    console.error('❌ Error:', e);
    status.className = 'status err';
    status.textContent = '❌ ' + e.message;
  }
}

function updateMap(data) {
  if (!marker) {
    marker = L.marker([data.lat, data.lng]).addTo(map);
    map.setView([data.lat, data.lng], 16);
  } else {
    marker.setLatLng([data.lat, data.lng]);
    map.panTo([data.lat, data.lng]);
  }
  
  document.getElementById('infoLoc').textContent = 
    '📍 ' + data.lat.toFixed(5) + ', ' + data.lng.toFixed(5) + ' (' + new Date(data.created_at).toLocaleString('id-ID') + ')';
}

window.addEventListener('load', () => {
  console.log('🚀 Page loaded');
  initApp();
});
</script>
</body>
</html>
